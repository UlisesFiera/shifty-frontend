<div class="emp-page" *ngIf="employee() as emp">

	<div class="emp-container">

		<div class="display" *ngIf="!isEditing()">
			<div class="emp-data-frame">
				<button class="button edit-emp-button"  (click)="openEditPanel()">edit</button>
				<div class="emp-data-content">
					<div class="thumb"
						[style.background-image]="'url(' + empService.getImageUrl(emp) + ')'" 
						[style.background-size]="'cover'" 
						[style.background-position]="'center'" 
						[style.background-repeat]="'no-repeat'"
					></div>
					<div *ngIf="emp.activeEntryId !== null" class="led green"></div>
					<div class="data-content">
						<p class="data">
							<span class="title">Id: </span>
							<span class="content">{{ emp.id }}</span>
						</p>
						<p class="data">
							<span class="title">{{ emp.name }}, </span>
							<span class="content">{{ emp.employeeCode }}</span>
						</p>
						<p class="data">
							<span class="title">E-mail: </span>
							<span class="content">{{ emp.email }}</span>
						</p>
						<p class="data">
							<span class="title">Role: </span>
							<span class="content">{{ emp.jobTitle }}</span>
						</p>
						<p class="data">
							<span class="title">Last shift: </span>
							<span *ngIf="emp.lastClockIn !== null" class="content">{{ lastShift }}</span>
							<span *ngIf="emp.lastClockIn === null" class="content">never</span>
						</p>
					</div>
				</div>
			</div>
		</div>

		<div class="edit-panel-container" *ngIf="isEditing()">
			<div class="edit-panel-frame" style="position: relative;">
				<button class="button close" (click)="closeEditPanel()">x</button>
				<div style="position: absolute; top: 5px; left: 250px; height: 50px; width: 50px; border: 1px, solid, #707070; border-radius: 50%; background-color: rgb(241, 241, 241); z-index: 3000;"></div>
				<img *ngIf="uploadedImage !== ''" [src]="uploadedImage" style="position: absolute; top: 5px; left: 250px; height: 50px; width: 50px; border-radius: 50%; z-index: 3000;">
				<div class="edit-panel-content">
					<span class="label">name</span>
					<input class="input editor" placeholder="{{ emp.name }}" [(ngModel)]="editName">
					<span class="label">email</span>
					<input class="input editor" placeholder="{{ emp.email }}" [(ngModel)]="editEmail">
					<span class="label">job title</span>
					<input class="input editor" placeholder="{{ emp.jobTitle }}" [(ngModel)]="editJobTitle">
					<div class="separator"></div>
					<button (click)="fileInput.click()" class="button picture">change profile picture</button>
					<input
						#fileInput
						type="file"
						accept="image/*"
						hidden
						(change)="onFileSelected($event)"
					/>
					<button class="button" (click)="saveChanges(emp)">save changes</button>
				</div>
			</div>
		</div>

	</div>
	<div class="wrap-bot-buttons">
		<button class="button back" onclick="window.history.back()"><mat-icon>arrow_back</mat-icon></button>
		<button class="button delete-emp" (click)="deleteEmp(emp)">delete employee</button>
	</div>
</div>
